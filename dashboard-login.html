<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="بوابة دخول لوحة تحكم مجمع الزبير — للمشرفين والمدرسين المعتمدين فقط.">
    <title>دخول لوحة التحكم — حلقات مجمع الزبير</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="scrollbar.css">
    <link rel="stylesheet" href="dashboard-login.css">
</head>
<body id="dashboard-login-page">

    <div class="dash-login-bg" aria-hidden="true"></div>
    <div class="dash-login-overlay" id="dash-login-overlay" aria-hidden="true"></div>

    <main class="dash-login-main">
        <section class="auth-card-wrap" aria-label="دخول لوحة التحكم">
            <div class="auth-card" id="dash-auth-card">
                <div class="card-body">
                    <div class="login-top-row">
                        <a href="index.html" class="lang-switch-btn" style="text-decoration:none;">الموقع</a>
                        <div class="login-brand">
                            <div class="login-brand-icon">
                                <svg viewBox="0 0 24 24">
                                    <path d="M4 19V7l8-4 8 4v12"/>
                                    <path d="M4 19h16"/>
                                    <path d="M9 19V9l3-1.5L15 9v10"/>
                                </svg>
                            </div>
                            <span>حلقات مجمع الزبير</span>
                        </div>
                    </div>

                    <p class="auth-security-warning" role="alert">
                        ⚠️ تنبيه صارم: هذه بوابة دخول المشرفين والمدرسين في مجمع الزبير. استخدم كودك المعتمد فقط.
                    </p>

                    <div class="auth-tabs auth-tabs--single" role="tablist" aria-label="دخول لوحة التحكم">
                        <div class="auth-tab auth-tab-static" aria-selected="true">دخول المشرف أو المدرس</div>
                    </div>

                    <form id="dash-login-form" novalidate>
                        <div class="field">
                            <label class="field-label" for="dash-login-id">كود الدخول الأكاديمي</label>
                            <div class="input-wrap" id="dash-login-id-wrap">
                                <input class="form-input" type="text" id="dash-login-id" inputmode="numeric"
                                    placeholder="أدخل كود المشرف أو المدرس (أرقام فقط)" required autocomplete="username"
                                    maxlength="10" pattern="[0-9]*">
                            </div>
                            <div class="field-error" id="err-dash-login-id">أدخل كوداً صحيحاً (أرقام فقط، 4–10 خانات).</div>
                        </div>

                        <div class="field">
                            <label class="field-label" for="dash-login-pass">كلمة السر</label>
                            <div class="input-wrap has-pass-toggle" id="dash-login-pass-wrap">
                                <input class="form-input pass-input" type="password" id="dash-login-pass"
                                    placeholder="أدخل كلمة السر" required autocomplete="current-password">
                                <button type="button" class="pass-toggle-btn" id="dash-login-pass-toggle"
                                    aria-label="إظهار كلمة السر" aria-pressed="false">
                                    <svg class="pass-eye-icon pass-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5Zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>
                                    </svg>
                                    <svg class="pass-eye-icon pass-eye-slash pass-eye-hidden" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M3.27 3.27 2 4.54l2.09 2.09C2.73 8.11 1 12.5 1 12.5c1.73 4.39 6 7.5 11 7.5 2.09 0 4.04-.53 5.74-1.45l2.36 2.36 1.27-1.27L3.27 3.27ZM12 17.5c-2.76 0-5.22-1.25-6.88-3.22l1.46-1.46a5.002 5.002 0 0 0 7.34-1.02l1.72 1.72c-.98.62-2.12 1-3.64 1.02Zm6.12-4.78-1.55-1.55a5.002 5.002 0 0 0-6.6-6.6L9.7 4.3C10.74 4.11 11.85 4 12 4c5 0 9.27 3.11 11 7.5-.64 1.62-1.67 3.06-2.88 4.22Z"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="field-error" id="err-dash-login-pass">كلمة السر: 8 خانات، أحرف صغيرة إنجليزية وأرقام فقط.</div>
                        </div>

                        <button type="submit" class="btn-block btn-primary-block" id="dash-login-submit-btn">متابعة</button>
                    </form>
                </div>
            </div>
        </section>

        <a href="index.html" class="dash-login-back">← العودة للموقع الرئيسي</a>
    </main>

    <div class="toast" id="dash-toast" role="status" aria-live="polite"></div>
    <script src="dashboard-login.js" charset="UTF-8"></script>
</body>
</html>
